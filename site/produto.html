    .prod-thumb img { width: 100%; height: 100%; object-fit: contain; }
    .prod-thumb:hover { transform: translateY(-2px); }

let coresShown = 20;

function coreCardHtml(c, p) {
  const tamBalde = c.tam_balde || (p && p.tam_balde_default) || '17L';
  const tamGalao = c.tam_galao || (p && p.tam_galao_default) || '3,4L';
  const tamQuarto = c.tam_quarto || (p && p.tam_quarto_default) || '1/4';
  return `
  <div class="core-card">
    <div class="core-swatch${c.borda ? ' core-swatch-branco' : ''}" style="background:${c.hex}"></div>
    <div class="core-info">
      <div class="core-nome">${c.nome}</div>
      <div class="core-hex">${c.hex}</div>
      ${c.preco_balde ? `<div class="core-preco">${tamBalde} ${c.preco_balde}<br>${tamGalao} ${c.preco_galao}${c.preco_quarto ? `<br>${tamQuarto} ${c.preco_quarto}` : ''}</div>` : ''}
    </div>
  </div>`;
}

function appendMoreCores(id) {
  const p = produtos[id];
  const grid = document.getElementById('cores-grid');
  if (!p || !p.cores || !grid) return;
  const next = p.cores.slice(coresShown, coresShown + 20);
  grid.insertAdjacentHTML('beforeend', next.map(c => coreCardHtml(c, p)).join(''));
  coresShown += 20;
  const btn = document.getElementById('cores-load-more');
  if (btn) btn.style.display = coresShown >= p.cores.length ? 'none' : 'flex';
}

            <h2>Produto não encontrado</h2>
            <p>O produto que você procura não existe ou foi removido.</p>
            <a href="index.html#produtos" style="display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;font-family:'Montserrat',sans-serif;font-weight:700;font-size:14px;padding:12px 24px;border-radius:8px;">← Ver todos os produtos</a>
          </div>
        </div>
      </div>`;
    return;
  }

  document.title = p.nome + ' — Tintas Laet';

  const imagensArr = p.imagens || (p.imagem ? [p.imagem] : []);
  const imgHtml = imagensArr.length
    ? `<img class="prod-hero-img" id="prod-main-img" src="${imagensArr[0]}" alt="${p.nome}">`
    : `<div class="prod-hero-img-placeholder">🖌️</div>`;
  const thumbsHtml = imagensArr.length > 1
    ? `<div class="prod-thumbs">${imagensArr.map((src, i) => `
        <button class="prod-thumb${i === 0 ? ' active' : ''}" onclick="setMainImage(this,'${src}')">
          <img src="${src}" alt="${p.nome} — foto ${i + 1}">
        </button>`).join('')}</div>`
    : '';

  const beneficiosHtml = p.beneficios.map(b => `<li>${b}</li>`).join('');

  const precosHtml = p.precos.map(pr => `
    <tr>
      <td>${pr.desc}</td>
      <td>${pr.valor}</td>
    </tr>`).join('');

  const tamanhoOptionsHtml = p.precos.map(pr => `<option value="${pr.desc}|${pr.valor}">${pr.desc} — ${pr.valor}</option>`).join('');
  const coresOptionsHtml = p.cores ? p.cores.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('') : '';

  const cartSelectionHtml = p.cores_precificadas ? `
    <div class="prod-cart-field">
      <label>Cor</label>
      <select id="cart-cor" onchange="updateTamanhoPrecificado('${id}')">
        ${p.tem_branca ? '<option value="Branca">Branca</option>' : ''}
        ${p.cores.filter(c => !c.borda).map(c => `<option value="${c.nome}">${c.nome}</option>`).join('')}
      </select>
    </div>
    <div class="prod-cart-field">
      <label>Tamanho</label>
      <select id="cart-tamanho"></select>
    </div>
  ` : `
    <div class="prod-cart-field">
      <label>Tamanho</label>
      <select id="cart-tamanho">${tamanhoOptionsHtml}</select>
    </div>
    ${p.cores ? `
    <div class="prod-cart-field">
      <label>Cor</label>
      <select id="cart-cor">${coresOptionsHtml}</select>
    </div>` : ''}
  `;

  const waUrl = `https://wa.me/5511977140964?text=${encodeURIComponent(p.wa)}`;
  document.getElementById('wa-float').href = waUrl;

  app.innerHTML = `
    <!-- HERO -->
    <section class="prod-hero">
      <div class="prod-hero-dots"></div>
      <div class="container">
        <div class="prod-hero-inner">
          <div class="prod-hero-info">
            <div class="prod-category">${p.categoria}</div>
            ${p.badge ? `<span class="prod-badge">${p.badge}</span>` : ''}
            <h1 class="prod-nome">${p.nome}</h1>
            <p class="prod-desc-curta">${p.desc_curta}</p>
            <div class="prod-price-block">
              <div class="prod-price-label">${p.preco_label || 'a partir de'}</div>
              <div class="prod-price-from">${p.preco_from}</div>
            </div>
            <a href="${waUrl}" class="prod-hero-cta" target="_blank" rel="noopener">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              Comprar no WhatsApp
            </a>
          </div>
          <div>
            <div class="prod-hero-img-wrap">${imgHtml}</div>
            ${thumbsHtml}
          </div>
        </div>
      </div>
    </section>

    <!-- BODY -->
    <section class="prod-body">
      <div class="container">
        <div class="prod-body-inner">
          <div>
            <h2 class="prod-section-title">Sobre o produto</h2>
            <p class="prod-descricao">${p.descricao}</p>
            <h2 class="prod-section-title">Benefícios</h2>
            <ul class="prod-beneficios">${beneficiosHtml}</ul>
            ${p.aviso ? `<div class="prod-aviso">${p.aviso}</div>` : ''}
          </div>
          <div>
            <div class="prod-price-card">
              <div class="prod-price-card-title">Tabela de preços</div>
              <table class="prod-price-table">${precosHtml}</table>

              <div class="prod-cart-box">
                ${cartSelectionHtml}
                <div class="prod-cart-field">
                  <label>Quantidade</label>
                  <input type="number" id="cart-qty" value="1" min="1">
                </div>
                <button class="prod-btn-cart" onclick="addToCartFromProduct('${id}')">
                  🛒 Adicionar ao carrinho
                </button>
              </div>

              <div class="prod-cta-box">
                <a href="${waUrl}" class="prod-btn-wa" target="_blank" rel="noopener">
                  💬 Comprar no WhatsApp
                </a>
                <a href="index.html#produtos" class="prod-btn-back">
                  ← Ver todos os produtos
                </a>
              </div>
              <p class="prod-note">⚠️ Preços sujeitos a alteração. Consulte disponibilidade de cores na sua loja.</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    ${p.cores ? `
    <!-- CATÁLOGO DE CORES -->
    <section class="prod-cores" id="cores">
      <div class="container">
        <div class="prod-cores-header">
          <div>
            <div class="prod-cores-title">Catálogo de Cores</div>
            <div class="prod-cores-count">${p.cores.length} cores disponíveis</div>
          </div>
          ${p.catalogo_pdf ? `
          <a href="${p.catalogo_pdf}" class="prod-cores-pdf" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Ver catálogo completo / PDF
          </a>` : ''}
        </div>

        <div class="cores-grid" id="cores-grid">
          ${p.cores.slice(0, coresShown).map(c => coreCardHtml(c, p)).join('')}
        </div>

        ${p.cores.length > coresShown ? `
        <button class="cores-load-more" id="cores-load-more" onclick="appendMoreCores('${id}')">
          Carregar mais cores ↓
        </button>` : ''}

        <div class="cores-aviso">
          ⚠️ <strong>Atenção sobre as cores:</strong> Cada tela — celular, computador ou tablet — exibe as cores de um jeito diferente dependendo do brilho, configuração e modelo do aparelho. As cores aqui são uma referência visual, mas podem não representar 100% o tom real da tinta.<br><br>
          Para ter certeza antes de comprar, <strong>recomendamos visitar uma de nossas lojas</strong> e consultar pessoalmente as cartelas de cor que ficam expostas na loja. Assim você vê o tom real da tinta e escolhe sem surpresa. Nossas lojas ficam no <strong>ABC e Zona Leste de SP</strong> — qualquer dúvida, é só chamar no WhatsApp! 😊
        </div>
      </div>
    </section>` : ''}
`;

  if (p.cores_precificadas) {
    setTimeout(() => updateTamanhoPrecificado(id), 0);
  }
}

render();

function updateTamanhoPrecificado(id) {
  const p = produtos[id];
  const corSel = document.getElementById('cart-cor');
  const tamanhoSel = document.getElementById('cart-tamanho');
  if (!p || !corSel || !tamanhoSel) return;
  const corNome = corSel.value;
  let opts = [];
  if (corNome === 'Branca') {
    const branca18 = p.precos.find(pr => pr.desc.includes('18L'));
    const branca36 = p.precos.find(pr => pr.desc.includes('3,6L'));
    if (branca18) opts.push(`<option value="18L|${branca18.valor}">18L — ${branca18.valor}</option>`);
    if (branca36) opts.push(`<option value="3,6L|${branca36.valor}">3,6L — ${branca36.valor}</option>`);
  } else {
    const cor = p.cores.find(c => c.nome === corNome);
    if (cor) {
      const tamBalde = cor.tam_balde || p.tam_balde_default || '17L';
      const tamGalao = cor.tam_galao || p.tam_galao_default || '3,4L';
      const tamQuarto = cor.tam_quarto || p.tam_quarto_default || '1/4';
      opts.push(`<option value="${tamBalde}|${cor.preco_balde}">${tamBalde} — ${cor.preco_balde}</option>`);
      opts.push(`<option value="${tamGalao}|${cor.preco_galao}">${tamGalao} — ${cor.preco_galao}</option>`);
      if (cor.preco_quarto) opts.push(`<option value="${tamQuarto}|${cor.preco_quarto}">${tamQuarto} — ${cor.preco_quarto}</option>`);
    }
  }
  tamanhoSel.innerHTML = opts.join('');
}

function setMainImage(btn, src) {
  const img = document.getElementById('prod-main-img');
  if (img) img.src = src;
  document.querySelectorAll('.prod-thumb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function addToCartFromProduct(id) {
  const p = produtos[id];
  if (!p) return;
  const tamanhoSel = document.getElementById('cart-tamanho');
  const corSel = document.getElementById('cart-cor');
  const qtyInput = document.getElementById('cart-qty');
  const [tamanho, valor] = tamanhoSel.value.split('|');
  const cor = corSel ? corSel.value : null;
  const qty = parseInt(qtyInput.value, 10) || 1;
  LaetCart.add({ produtoId: id, nome: p.nome, tamanho, valor, cor, qty });
}

function initZoom() {
  const wrap = document.querySelector('.prod-hero-img-wrap');
  const img = wrap && wrap.querySelector('img');
  if (!wrap || !img) return;
  wrap.addEventListener('mousemove', (e) => {
    const r = wrap.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width) * 100;
    const y = ((e.clientY - r.top) / r.height) * 100;
    img.style.transformOrigin = `${x}% ${y}%`;
    img.style.transform = 'scale(2.4)';
    wrap.style.cursor = 'zoom-in';
  });
  wrap.addEventListener('mouseleave', () => {
    img.style.transform = 'scale(1)';
    img.style.transformOrigin = 'center center';
  });
}
setTimeout(initZoom, 50);
</script>
<script src="cart.js"></script>
</body>
