<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cupom enviado! — Tintas Laet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(160deg, #062B63 0%, #1565C0 100%); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; }
    :root { --yellow: #FFC107; }
    .card { max-width: 460px; }
    .check { font-size: 64px; margin-bottom: 18px; animation: pop .5s ease; }
    @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }
    h1 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: clamp(22px, 4vw, 30px); margin-bottom: 14px; color: var(--yellow); }
    p { font-size: 15px; color: rgba(255,255,255,.85); line-height: 1.7; margin-bottom: 28px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; border-radius: 50px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 14px; margin: 6px; }
    .btn-yellow { background: var(--yellow); color: #1a1000; }
    .btn-ghost { border: 2px solid rgba(255,255,255,.5); color: #fff; }
    @media print { .btn { display: none !important; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">🎉</div>
    <h1>Cupom recebido!</h1>
    <p>Seu cupom já está concorrendo ao sorteio deste mês. Acompanhe o resultado ao vivo no Instagram — e boa sorte!</p>
    <a href="https://www.instagram.com/tintaslaet" class="btn btn-yellow" target="_blank" rel="noopener">📷 Seguir @TintasLaet</a>
    <a href="sorteios.html" class="btn btn-ghost">← Voltar pro sorteio</a>
    <button type="button" class="btn btn-ghost" onclick="window.print()">🖨️ Imprimir / Baixar</button>
  </div>
</body>
</html>
