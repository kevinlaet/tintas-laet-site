<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Orçamento — Tintas Laet</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; color: #212529; background: #F0F2F5; }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    :root { --blue: #0D47A1; --blue-dark: #062B63; --blue-mid: #1565C0; --yellow: #FFC107; }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 13px 22px; border-radius: 10px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13.5px; cursor: pointer; border: none; transition: transform .18s, box-shadow .18s; }
    .btn:hover { transform: translateY(-2px); }
    .btn-blue { background: var(--blue); color: #fff; box-shadow: 0 4px 16px rgba(13,71,161,.35); }
    .btn-yellow { background: linear-gradient(135deg, var(--yellow), #FFD54A); color: #1a1000; box-shadow: 0 4px 18px rgba(255,193,7,.45); }
    .btn-ghost { background: #fff; color: #C62828; border: 1.5px solid #F3CBCB; }

    /* GATE */
    .gate { position: fixed; inset: 0; background: linear-gradient(160deg, var(--blue-dark), var(--blue)); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
    .gate-box { background: #fff; border-radius: 18px; padding: 36px 30px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .gate-logo { width: 140px; margin: 0 auto 18px; }
    .gate-box h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 18px; color: var(--blue-dark); margin-bottom: 6px; }
    .gate-box p { font-size: 13px; color: #888; margin-bottom: 18px; line-height: 1.5; }
    .gate-box input { width: 100%; padding: 12px 14px; border: 1.5px solid #DCE1EA; border-radius: 9px; font-size: 14px; margin-bottom: 12px; text-align: center; }
    .gate-box input:focus { outline: none; border-color: var(--blue); }
    .gate-error { color: #C62828; font-size: 12.5px; margin-top: 10px; }

    /* TOOL */
    .navbar { background: var(--blue-dark); padding: 8px 0; }
    .navbar-inner { max-width: 880px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
    .navbar-logo img { height: 64px; }
    .navbar-back { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13px; color: rgba(255,255,255,.75); }
    .navbar-back:hover { color: var(--yellow); }

    .tool-hero { background: linear-gradient(150deg, var(--blue-dark) 0%, var(--blue) 60%, var(--blue-mid) 100%); padding: 38px 20px 64px; position: relative; overflow: hidden; }
    .tool-hero::after { content: ''; position: absolute; top: -40%; right: -10%; width: 360px; height: 360px; border-radius: 50%; background: radial-gradient(circle, rgba(255,193,7,.12) 0%, transparent 70%); pointer-events: none; }
    .tool-hero-inner { max-width: 880px; margin: 0 auto; position: relative; z-index: 1; }
    .tool-hero h1 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 26px; color: #fff; margin-bottom: 6px; }
    .tool-hero p { font-size: 13.5px; color: rgba(255,255,255,.75); }

    .wrap { max-width: 880px; margin: -40px auto 0; padding: 0 20px 80px; position: relative; z-index: 2; }

    .card { background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 14px 40px rgba(13,71,161,.12); margin-bottom: 20px; border: 1px solid rgba(13,71,161,.06); }
    .card-title { display: flex; align-items: center; gap: 8px; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 12.5px; color: var(--blue); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1.5px solid #EEF2FA; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .field label { display: block; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 11.5px; color: #667; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .3px; }
    .field input, .field select { width: 100%; padding: 12px 13px; border: 1.5px solid #DCE1EA; border-radius: 9px; font-size: 13.5px; font-family: 'Poppins', sans-serif; background: #FAFBFD; transition: border-color .15s, background .15s; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--blue); background: #fff; }

    .item-card { background: linear-gradient(135deg, #F7F9FF, #F0F4FC); border: 1px solid #E5E9F0; border-radius: 14px; padding: 16px; margin-bottom: 12px; position: relative; }
    .item-grid { display: grid; grid-template-columns: 2fr 1.4fr .7fr 1fr; gap: 10px; align-items: end; }
    .item-grid .field { margin: 0; }
    .item-subtotal { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 14px; color: var(--blue); text-align: right; padding: 11px 4px; }
    .item-remove { position: absolute; top: -10px; right: -10px; width: 26px; height: 26px; border-radius: 50%; background: #FBEAEA; border: 1.5px solid #F3CBCB; color: #C62828; cursor: pointer; font-size: 13px; }
    .add-item-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; background: #EFF4FF; border: 1.5px dashed rgba(13,71,161,.35); border-radius: 10px; padding: 14px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13px; color: var(--blue); cursor: pointer; transition: background .15s; }
    .add-item-btn:hover { background: rgba(13,71,161,.08); }

    .total-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; margin-top: 10px; background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid)); border-radius: 12px; }
    .total-row span:first-child { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 13px; color: rgba(255,255,255,.75); letter-spacing: .5px; }
    .total-row span:last-child { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 26px; color: var(--yellow); }

    .actions { display: flex; gap: 12px; flex-wrap: wrap; }

    .print-only { display: none; }

    @media (max-width: 680px) {
      .field-row { grid-template-columns: 1fr; }
      .item-grid { grid-template-columns: 1fr 1fr; }
      .item-grid .field:nth-child(1), .item-grid .field:nth-child(2) { grid-column: 1 / 3; }
      .item-subtotal { text-align: left; }
      .wrap { margin-top: -24px; }
      .tool-hero { padding: 30px 20px 48px; }
    }

    @page { margin: 10mm 14mm; }

    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body { background: #fff; }
      .navbar, .tool-hero, .wrap { display: none !important; }
      .print-only { display: block !important; }
      .pdf-page { max-width: 100%; margin: 0 auto; padding: 0; }

      .pdf-band { background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 55%, var(--blue-mid) 100%); border-radius: 22px; padding: 26px 30px 22px; position: relative; overflow: hidden; margin-bottom: 26px; }
      .pdf-band::after { content: ''; position: absolute; top: -50%; right: -8%; width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, rgba(255,193,7,.22) 0%, transparent 70%); }
      .pdf-band-top { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
      .pdf-band-logo { display: flex; align-items: center; gap: 10px; overflow: visible; }
      .pdf-band-logo img.pdf-logo { width: 160px; transform: scale(1.45); transform-origin: left center; }
      .pdf-validade-pill { background: var(--yellow); color: #1a1000; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 10.5px; letter-spacing: .3px; padding: 7px 14px; border-radius: 100px; white-space: nowrap; }
      .pdf-band-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 34px; color: #fff; letter-spacing: .5px; margin-top: 18px; position: relative; z-index: 1; }

      .pdf-info { background: #F4F8FE; border: 1px solid #E1EAFA; border-radius: 16px; padding: 18px 22px; margin-bottom: 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
      .pdf-info-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
      .pdf-info-row.full { grid-column: 1 / 3; }
      .pdf-info-icon { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--blue-mid)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
      .pdf-info-row strong { font-family: 'Montserrat', sans-serif; color: var(--blue-dark); }

      .pdf-table { width: 100%; border-collapse: collapse; margin-bottom: 22px; border-radius: 12px; overflow: hidden; box-shadow: 0 0 0 1px #E5E9F0; }
      .pdf-table th { background: linear-gradient(135deg, var(--blue-dark), var(--blue)); color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: .3px; padding: 12px 10px; text-align: left; text-transform: uppercase; }
      .pdf-table th:not(:first-child) { text-align: center; }
      .pdf-table td { padding: 11px 10px; font-size: 13px; }
      .pdf-table td:not(:first-child) { text-align: center; }
      .pdf-table tbody tr:nth-child(even) { background: #F4F8FE; }
      .pdf-table tbody tr:nth-child(odd) { background: #fff; }

      .pdf-total-box { background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid)); border-radius: 14px; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
      .pdf-total-box span:first-child { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 13px; color: rgba(255,255,255,.75); letter-spacing: 1px; text-transform: uppercase; }
      .pdf-total-box span:last-child { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 28px; color: var(--yellow); }

      .pdf-pagamento { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; background: #F4F8FE; border: 1px solid #E1EAFA; border-radius: 100px; padding: 8px 18px; margin-bottom: 22px; }
      .pdf-pagamento strong { color: var(--blue-dark); font-family: 'Montserrat', sans-serif; }

      .pdf-footer { background: linear-gradient(135deg, var(--blue-dark), var(--blue)); border-radius: 10px; padding: 12px; text-align: center; font-size: 10.5px; color: rgba(255,255,255,.8); }
    }
  </style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <img src="images/logo-azul.png" class="gate-logo" alt="Tintas Laet">
    <h1>Acesso restrito</h1>
    <p>Ferramenta interna pra vendedores Tintas Laet gerarem orçamentos.</p>
    <input type="password" id="gatePass" placeholder="Senha" onkeydown="if(event.key==='Enter') checkPassword()">
    <button class="btn btn-blue" style="width:100%;justify-content:center" onclick="checkPassword()">Entrar</button>
    <p class="gate-error" id="gateError" style="display:none">Senha incorreta.</p>
  </div>
</div>

<!-- TOOL -->
<div id="tool" style="display:none">
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo"><img src="images/logo-branco.png" alt="Tintas Laet"></a>
      <a href="index.html" class="navbar-back">← Voltar ao site</a>
    </div>
  </nav>

  <div class="tool-hero">
    <div class="tool-hero-inner">
      <h1>🧾 Gerador de Orçamento</h1>
      <p>Monte o orçamento com os produtos reais do catálogo e gere o PDF pro cliente.</p>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="card-title">Dados do orçamento</div>
      <div class="field-row">
        <div class="field">
          <label>Vendedor</label>
          <select id="f-vendedor">
            <option value="">Selecione...</option>
            <option>Kevin</option>
            <option>Fábio</option>
            <option>Júlio</option>
            <option>Anderson</option>
            <option>Robson</option>
            <option>Clenice</option>
            <option>Filipy</option>
            <option>Allan</option>
            <option>Felipe</option>
          </select>
        </div>
        <div class="field">
          <label>Loja</label>
          <select id="f-loja">
            <option value="">Selecione...</option>
            <option>Loja 1 — Sapopemba</option>
            <option>Loja 2 — São João</option>
            <option>Loja 3 — Ayrton Senna</option>
            <option>Loja 4 — Santo André</option>
            <option>Loja Online</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Cliente</label><input id="f-cliente" placeholder="Nome do cliente"></div>
        <div class="field"><label>WhatsApp do cliente</label><input id="f-whatsapp" placeholder="(11) 90000-0000"></div>
      </div>
      <div class="field-row">
        <div class="field" style="grid-column:1/3"><label>Endereço do cliente</label><input id="f-endereco" placeholder="Rua, número, bairro - cidade"></div>
      </div>
      <div class="field-row">
        <div class="field" style="grid-column:1/3">
          <label>Forma de pagamento</label>
          <select id="f-pagamento">
            <option>Pix</option>
            <option>Dinheiro</option>
            <option>Cartão débito</option>
            <option>Cartão crédito (até 12x sem juros)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Produtos</div>
      <div id="itemsList"></div>
      <button class="add-item-btn" id="addItemBtn">+ Adicionar produto</button>

      <div class="field-row" style="margin-top:18px">
        <div class="field"><label>Valor do frete</label><input type="number" id="f-frete" value="0" step="0.01" min="0" oninput="recalcTotal()"></div>
        <div class="field"><label>Desconto (R$)</label><input type="number" id="f-desconto" value="0" step="0.01" min="0" oninput="recalcTotal()"></div>
      </div>

      <div class="total-row">
        <span>TOTAL</span>
        <span id="totalDisplay">R$ 0,00</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-yellow" id="genPdfBtn">🖨️ Gerar PDF</button>
      <button class="btn btn-ghost" id="clearBtn">🗑️ Limpar tudo</button>
    </div>
  </div>
</div>

<div class="print-only" id="printArea"></div>

<template id="itemTemplate">
  <div class="item-card">
    <button type="button" class="item-remove" aria-label="Remover">✕</button>
    <div class="item-grid">
      <div class="field">
        <label>Produto</label>
        <select data-f="produto"></select>
      </div>
      <div class="field">
        <label>Variante</label>
        <select data-f="variante"></select>
      </div>
      <div class="field">
        <label>Qtd</label>
        <input type="number" data-f="qty" value="1" min="1">
      </div>
      <div class="field">
        <label>Valor unit.</label>
        <input type="number" data-f="valor" step="0.01" min="0">
      </div>
    </div>
    <div class="item-subtotal" data-f="subtotal">R$ 0,00</div>
  </div>
</template>

<script>
const SENHA = 'laet2026';

function checkPassword() {
  const input = document.getElementById('gatePass').value;
  if (input === SENHA) {
    sessionStorage.setItem('laet_orcamento_unlocked', '1');
    document.getElementById('gate').style.display = 'none';
    document.getElementById('tool').style.display = 'block';
    initTool();
  } else {
    document.getElementById('gateError').style.display = 'block';
  }
}

if (sessionStorage.getItem('laet_orcamento_unlocked') === '1') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('tool').style.display = 'block';
  initTool();
}

let produtosData = null;

async function loadProdutos() {
  if (produtosData) return produtosData;
  const res = await fetch('produto.html?v=' + Date.now(), { cache: 'no-store' });
  if (!res.ok) throw new Error('produto.html retornou status ' + res.status);
  const text = await res.text();
  const match = text.match(/const produtos = (\{[\s\S]*?\n\});/);
  if (!match) throw new Error('Não encontrou o objeto "produtos" dentro de produto.html');
  produtosData = (new Function('return ' + match[1]))();
  return produtosData;
}

function parsePrice(str) {
  if (!str) return 0;
  const n = String(str).replace(/[^\d,]/g, '').replace(',', '.');
  return parseFloat(n) || 0;
}
function formatPrice(n) {
  return 'R$ ' + (n || 0).toFixed(2).replace('.', ',');
}

function flattenOptions(p) {
  const opts = [];
  const corPrecificada = p.cores && p.cores.some(c => c.preco_balde);
  if (corPrecificada) {
    p.cores.forEach(c => {
      const tamBalde = c.tam_balde || p.tam_balde_default || '17L';
      const tamGalao = c.tam_galao || p.tam_galao_default || '3,4L';
      opts.push({ label: `${c.nome} — ${tamBalde}`, valor: c.preco_balde });
      opts.push({ label: `${c.nome} — ${tamGalao}`, valor: c.preco_galao });
      if (c.preco_quarto) {
        const tamQuarto = c.tam_quarto || p.tam_quarto_default || '1/4';
        opts.push({ label: `${c.nome} — ${tamQuarto}`, valor: c.preco_quarto });
      }
    });
  } else if (p.cor_preco_unico && p.cores) {
    p.cores.forEach(c => {
      opts.push({ label: c.nome, valor: c.preco });
    });
  } else if (p.cores && p.precos && p.precos.length > 1) {
    // Cor decorativa com preco fixo por tamanho (ex: Branca tem um preco, as
    // demais cores compartilham outro) - nao cruzar toda cor com todo preco.
    const stripSuffix = desc => desc.replace(/\s*—\s*(cores|branca)\s*$/i, '');
    const brancaEntries = p.precos.filter(pr => /branca/i.test(pr.desc));
    const coresEntries = p.precos.filter(pr => !/branca/i.test(pr.desc));
    const whiteColor = p.cores.find(c => c.borda);
    p.cores.filter(c => !c.borda).forEach(c => {
      coresEntries.forEach(pr => opts.push({ label: `${c.nome} — ${stripSuffix(pr.desc)}`, valor: pr.valor }));
    });
    if (whiteColor) {
      brancaEntries.forEach(pr => opts.push({ label: `${whiteColor.nome} — ${stripSuffix(pr.desc)}`, valor: pr.valor }));
    } else {
      brancaEntries.forEach(pr => opts.push({ label: pr.desc, valor: pr.valor }));
    }
  } else if (p.cores && p.precos) {
    p.cores.forEach(c => {
      p.precos.forEach(pr => opts.push({ label: `${pr.desc} — ${c.nome}`, valor: pr.valor }));
    });
  } else if (p.precos) {
    p.precos.forEach(pr => opts.push({ label: pr.desc, valor: pr.valor }));
  }
  return opts;
}

async function initTool() {
  document.getElementById('addItemBtn').addEventListener('click', addItemRow);
  document.getElementById('genPdfBtn').addEventListener('click', gerarPDF);
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('Limpar todos os dados do orçamento?')) return;
    document.getElementById('itemsList').innerHTML = '';
    addItemRow();
    document.getElementById('f-frete').value = 0;
    document.getElementById('f-desconto').value = 0;
    recalcTotal();
  });

  try {
    await loadProdutos();
  } catch (e) {
    console.error('Falha ao carregar produtos de produto.html (1a tentativa):', e);
    try {
      await loadProdutos();
    } catch (e2) {
      console.error('Falha ao carregar produtos de produto.html (2a tentativa):', e2);
      produtosData = produtosData || {};
      alert('Não foi possível carregar a lista de produtos automaticamente. Recarregue a página (Ctrl+Shift+R). Se persistir, avise o Kevin.');
    }
  }
  addItemRow();
}

function addItemRow() {
  const template = document.getElementById('itemTemplate');
  const node = template.content.cloneNode(true);
  const card = node.querySelector('.item-card');
  const produtoSel = card.querySelector('[data-f="produto"]');
  const varianteSel = card.querySelector('[data-f="variante"]');
  const qtyInput = card.querySelector('[data-f="qty"]');
  const valorInput = card.querySelector('[data-f="valor"]');

  produtoSel.innerHTML = '<option value="">Selecione...</option>' +
    Object.keys(produtosData)
      .sort((a, b) => produtosData[a].nome.localeCompare(produtosData[b].nome, 'pt-BR'))
      .map(id => `<option value="${id}">${produtosData[id].nome}</option>`).join('');

  produtoSel.addEventListener('change', () => {
    const p = produtosData[produtoSel.value];
    const opts = p ? flattenOptions(p) : [];
    varianteSel.innerHTML = opts.map((o, i) => `<option value="${i}" data-valor="${parsePrice(o.valor)}">${o.label}</option>`).join('');
    if (opts.length) {
      valorInput.value = parsePrice(opts[0].valor).toFixed(2);
    } else {
      valorInput.value = '';
    }
    recalcRow(card);
  });

  varianteSel.addEventListener('change', () => {
    const selected = varianteSel.options[varianteSel.selectedIndex];
    if (selected) valorInput.value = parseFloat(selected.getAttribute('data-valor')).toFixed(2);
    recalcRow(card);
  });

  qtyInput.addEventListener('input', () => recalcRow(card));
  valorInput.addEventListener('input', () => recalcRow(card));

  card.querySelector('.item-remove').addEventListener('click', () => {
    card.remove();
    recalcTotal();
  });

  document.getElementById('itemsList').appendChild(card);
}

function recalcRow(card) {
  const qty = parseFloat(card.querySelector('[data-f="qty"]').value) || 0;
  const valor = parseFloat(card.querySelector('[data-f="valor"]').value) || 0;
  card.querySelector('[data-f="subtotal"]').textContent = formatPrice(qty * valor);
  recalcTotal();
}

function recalcTotal() {
  let total = 0;
  document.querySelectorAll('.item-card').forEach(card => {
    const qty = parseFloat(card.querySelector('[data-f="qty"]').value) || 0;
    const valor = parseFloat(card.querySelector('[data-f="valor"]').value) || 0;
    total += qty * valor;
  });
  total += parseFloat(document.getElementById('f-frete').value) || 0;
  total -= parseFloat(document.getElementById('f-desconto').value) || 0;
  if (total < 0) total = 0;
  document.getElementById('totalDisplay').textContent = formatPrice(total);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function gerarPDF() {
  const vendedor = escapeHtml(document.getElementById('f-vendedor').value) || '—';
  const loja = escapeHtml(document.getElementById('f-loja').value) || '—';
  const cliente = escapeHtml(document.getElementById('f-cliente').value) || '—';
  const whatsapp = escapeHtml(document.getElementById('f-whatsapp').value) || '—';
  const endereco = escapeHtml(document.getElementById('f-endereco').value) || '—';
  const validade = '7';
  const pagamento = escapeHtml(document.getElementById('f-pagamento').value);
  const dataFmt = new Date().toLocaleDateString('pt-BR');
  const frete = parseFloat(document.getElementById('f-frete').value) || 0;
  const desconto = parseFloat(document.getElementById('f-desconto').value) || 0;

  let total = frete;
  let rowsHtml = '';
  document.querySelectorAll('.item-card').forEach(card => {
    const produtoSel = card.querySelector('[data-f="produto"]');
    const varianteSel = card.querySelector('[data-f="variante"]');
    const qty = parseFloat(card.querySelector('[data-f="qty"]').value) || 0;
    const valor = parseFloat(card.querySelector('[data-f="valor"]').value) || 0;
    const p = produtosData[produtoSel.value];
    if (!p || qty <= 0) return;
    const variante = varianteSel.options[varianteSel.selectedIndex] ? varianteSel.options[varianteSel.selectedIndex].textContent : '';
    const subtotal = qty * valor;
    total += subtotal;
    rowsHtml += `<tr>
      <td>${escapeHtml(p.nome)}${variante ? ' — ' + escapeHtml(variante) : ''}</td>
      <td>${qty}</td>
      <td>${formatPrice(valor)}</td>
      <td>${formatPrice(subtotal)}</td>
    </tr>`;
  });
  if (frete > 0) {
    rowsHtml += `<tr><td>Valor do frete</td><td>1</td><td>${formatPrice(frete)}</td><td>${formatPrice(frete)}</td></tr>`;
  }
  if (desconto > 0) {
    total -= desconto;
    rowsHtml += `<tr><td>Desconto</td><td>—</td><td>—</td><td>-${formatPrice(desconto)}</td></tr>`;
  }
  if (total < 0) total = 0;

  const html = `
    <div class="pdf-page">
      <div class="pdf-band">
        <div class="pdf-band-top">
          <div class="pdf-band-logo">
            <img src="images/logo-branco.png" class="pdf-logo" alt="Tintas Laet">
          </div>
          <div class="pdf-validade-pill">Válido por ${validade} dias</div>
        </div>
        <div class="pdf-band-title">ORÇAMENTO</div>
      </div>

      <div class="pdf-info">
        <div class="pdf-info-row"><span class="pdf-info-icon">📅</span><span><strong>Data:</strong> ${dataFmt}</span></div>
        <div class="pdf-info-row"><span class="pdf-info-icon">🧑‍🔧</span><span><strong>Vendedor:</strong> ${vendedor}</span></div>
        <div class="pdf-info-row"><span class="pdf-info-icon">👤</span><span><strong>Cliente:</strong> ${cliente}</span></div>
        <div class="pdf-info-row"><span class="pdf-info-icon">🏬</span><span><strong>Loja:</strong> ${loja}</span></div>
        <div class="pdf-info-row"><span class="pdf-info-icon">💬</span><span><strong>WhatsApp:</strong> ${whatsapp}</span></div>
        <div class="pdf-info-row full"><span class="pdf-info-icon">📍</span><span><strong>Endereço:</strong> ${endereco}</span></div>
      </div>

      <table class="pdf-table">
        <thead><tr><th>Produto</th><th>Quantidade</th><th>Valor Unitário</th><th>Subtotal</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>

      <div class="pdf-total-box">
        <span>Total</span>
        <span>${formatPrice(total)}</span>
      </div>

      <div class="pdf-pagamento">💲 <strong>Pagamento:</strong> ${pagamento}</div>
      <div class="pdf-footer">Tintas Laet — orçamento gerado em ${new Date().toLocaleDateString('pt-BR')}. Sujeito a confirmação de estoque.</div>
    </div>
  `;
  document.getElementById('printArea').innerHTML = html;
  window.print();
}
</script>
