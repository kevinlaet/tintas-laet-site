<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tintas Laet — Como Comprar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden}

@keyframes bgPulse{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeLeft{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeRight{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes barSlide{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes shimmerBar{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes phonePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,193,7,.4),0 8px 40px rgba(255,193,7,.2)}50%{box-shadow:0 0 0 14px rgba(255,193,7,0),0 8px 40px rgba(255,193,7,.35)}}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes counterRotate{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes glowPulse{0%,100%{opacity:.12;transform:scale(1)}50%{opacity:.25;transform:scale(1.05)}}
@keyframes dotFloat{0%,100%{transform:translateY(0) scale(1);opacity:.5}50%{transform:translateY(-10px) scale(1.4);opacity:1}}
@keyframes benefitSlide{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes scanLine{0%{top:-4px}100%{top:1084px}}
@keyframes numberGlow{0%,100%{text-shadow:0 0 20px rgba(255,193,7,.5)}50%{text-shadow:0 0 50px rgba(255,193,7,.9),0 0 80px rgba(255,193,7,.4)}}

.canvas{
  width:1080px;height:1080px;
  background:linear-gradient(155deg,#03193D,#062B63,#0A3580,#062B63);
  background-size:400% 400%;
  animation:bgPulse 10s ease infinite;
  position:relative;overflow:hidden;
}

/* Dot grid */
.dot-grid{
  position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.06) 1.5px,transparent 1.5px);
  background-size:38px 38px;pointer-events:none;
  animation:fadeIn 2s both .3s;
}

/* Scan line */
.scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,rgba(255,193,7,.2),transparent);
  animation:scanLine 7s linear infinite 2.5s;z-index:20;pointer-events:none;
}

/* Arcs — right side */
.arc{position:absolute;border-radius:50%}
.arc-1{
  width:780px;height:780px;border:1.5px solid rgba(255,193,7,.10);
  top:-260px;right:-250px;
  animation:rotate 45s linear infinite,fadeIn 1s both .3s;
}
.arc-2{
  width:520px;height:520px;border:1px solid rgba(255,255,255,.06);
  top:-60px;right:-70px;
  animation:counterRotate 28s linear infinite,fadeIn 1s both .5s;
}

/* Glow behind mascote area */
.glow-left{
  position:absolute;
  width:500px;height:700px;
  background:radial-gradient(ellipse,rgba(255,193,7,.10) 0%,transparent 60%);
  left:-100px;bottom:0;
  animation:glowPulse 5s ease-in-out infinite,fadeIn 1.5s both 1s;
}

/* Diagonal accent */
.diag-strip{
  position:absolute;
  width:4px;height:600px;
  background:linear-gradient(to bottom,transparent,rgba(255,193,7,.2),transparent);
  left:460px;top:100px;transform:rotate(12deg);
  animation:fadeIn 1s both 1.2s;
}

/* Floating dots */
.fdot{position:absolute;border-radius:50%;background:#FFC107}
.fdot-1{width:8px;height:8px;left:470px;top:180px;animation:dotFloat 2.8s ease-in-out infinite 0s,fadeIn 1s both 1.5s}
.fdot-2{width:5px;height:5px;left:458px;top:380px;animation:dotFloat 2.8s ease-in-out infinite .7s,fadeIn 1s both 1.7s}
.fdot-3{width:9px;height:9px;left:475px;top:600px;animation:dotFloat 2.8s ease-in-out infinite 1.4s,fadeIn 1s both 1.9s}

/* ── Mascote (left) ── */
.mascot-wrap{
  position:absolute;left:-10px;bottom:80px;width:470px;z-index:4;
  animation:fadeLeft 1.1s cubic-bezier(.22,.61,.36,1) both .8s;
}
.mascot-wrap img{
  width:100%;display:block;
  mix-blend-mode:multiply;
  animation:float 4s ease-in-out infinite 2s;
}
.mfade-right{
  position:absolute;right:0;top:0;bottom:0;width:200px;
  background:linear-gradient(to left,#062B63 20%,rgba(6,43,99,.5) 60%,transparent);
  z-index:5;pointer-events:none;
}
.mfade-bottom{
  position:absolute;left:0;right:0;bottom:0;height:120px;
  background:linear-gradient(to top,#062B63 20%,transparent);
  z-index:5;pointer-events:none;
}

/* ── Right content ── */
.content{
  position:absolute;right:0;top:0;
  width:640px;height:1000px;
  padding:72px 72px 0 50px;z-index:6;
  display:flex;flex-direction:column;
}
.logo-wrap{
  width:165px;animation:fadeRight .9s ease both .5s;
}
.logo-wrap img{width:100%;display:block;mix-blend-mode:screen}

.cta-block{flex:1;display:flex;flex-direction:column;justify-content:center}

.cta-intro{
  font-family:'Poppins',sans-serif;font-weight:600;font-size:21px;
  color:rgba(255,255,255,.65);letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:8px;
  animation:fadeUp .8s ease both .9s;
}
.cta-title{
  font-family:'Bebas Neue',cursive;
  font-size:84px;line-height:.88;color:#fff;letter-spacing:3px;
  animation:fadeUp .9s cubic-bezier(.22,.61,.36,1) both 1.1s;
}
.cta-title .yellow{
  background:linear-gradient(90deg,#FFC107,#FFE082,#FFC107);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:fadeUp .9s cubic-bezier(.22,.61,.36,1) both 1.1s,shimmerBar 3s linear infinite 2.5s;
}

/* Phone number box */
.phone-box{
  margin-top:26px;
  background:rgba(255,193,7,.08);
  border:1.5px solid rgba(255,193,7,.35);
  border-radius:18px;padding:18px 22px;
  display:flex;align-items:center;gap:16px;
  animation:fadeUp .8s ease both 1.5s, phonePulse 2.5s ease-in-out infinite 3s;
}
.phone-ico{font-size:30px;flex-shrink:0}
.phone-num{
  font-family:'Bebas Neue',cursive;
  font-size:52px;line-height:1;color:#FFC107;letter-spacing:2px;
  animation:numberGlow 2.5s ease-in-out infinite 3.2s;
}
.phone-hint{
  font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;
  color:rgba(255,255,255,.5);margin-top:3px;
  text-transform:uppercase;letter-spacing:.5px;
}

/* Benefits */
.benefits{margin-top:28px;display:flex;flex-direction:column;gap:14px}
.benefit-item{
  display:flex;align-items:center;gap:14px;
  animation:benefitSlide .7s ease both;
}
.benefit-item:nth-child(1){animation-delay:1.8s}
.benefit-item:nth-child(2){animation-delay:2s}
.benefit-item:nth-child(3){animation-delay:2.2s}
.benefit-dot{
  width:10px;height:10px;background:#FFC107;border-radius:50%;flex-shrink:0;
  box-shadow:0 0 8px rgba(255,193,7,.5);
}
.benefit-text{
  font-family:'Poppins',sans-serif;font-size:18px;font-weight:500;
  color:rgba(255,255,255,.84);
}

/* Bottom bar */
.bottom-bar{
  position:absolute;bottom:0;left:0;right:0;height:80px;
  background:#FFC107;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 75px;
  animation:barSlide .9s cubic-bezier(.22,.61,.36,1) both 2.4s;
  overflow:hidden;
}
.bottom-bar::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  background-size:200%;animation:shimmerBar 4s linear infinite 4s;
}
.bb-left{
  font-family:'Poppins',sans-serif;font-weight:600;font-size:16px;
  color:#062B63;position:relative;z-index:1;
}
.bb-insta{
  font-family:'Poppins',sans-serif;font-weight:800;font-size:18px;
  color:#062B63;position:relative;z-index:1;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="dot-grid"></div>
  <div class="scan-line"></div>
  <div class="arc arc-1"></div>
  <div class="arc arc-2"></div>
  <div class="glow-left"></div>
  <div class="diag-strip"></div>
  <div class="fdot fdot-1"></div>
  <div class="fdot fdot-2"></div>
  <div class="fdot fdot-3"></div>

  <div class="mascot-wrap">
    <img src="../../identidade/mascote oficial pose 1.jpg" alt="">
    <div class="mfade-right"></div>
    <div class="mfade-bottom"></div>
  </div>

  <div class="content">
    <div class="logo-wrap">
      <img src="../../identidade/logotipo branco.jpg" alt="Tintas Laet">
    </div>
    <div class="cta-block">
      <div class="cta-intro">Fala com a gente</div>
      <div class="cta-title">PEÇA NO<br><span class="yellow">WHATSAPP</span></div>
      <div class="phone-box">
        <div class="phone-ico">📱</div>
        <div>
          <div class="phone-num">(11) 97714-0964</div>
          <div class="phone-hint">Seg a Sáb · das 8h às 18h</div>
        </div>
      </div>
      <div class="benefits">
        <div class="benefit-item">
          <div class="benefit-dot"></div>
          <div class="benefit-text">Entrega com frete justo</div>
        </div>
        <div class="benefit-item">
          <div class="benefit-dot"></div>
          <div class="benefit-text">Parcele em até 12x sem juros</div>
        </div>
        <div class="benefit-item">
          <div class="benefit-dot"></div>
          <div class="benefit-text">4 lojas — ABC e Zona Leste</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="bb-left">Atendemos na loja ou entregamos na sua casa</span>
    <span class="bb-insta">@Tintaslaet</span>
  </div>
</div>
</body>
</html>
