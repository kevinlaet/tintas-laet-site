<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tintas Laet — Apresentação</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden}

@keyframes bgPulse{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeLeft{from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeRight{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes barGrow{from{width:0;opacity:0}to{width:55px;opacity:1}}
@keyframes barSlide{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes counterRotate{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes shimmerBar{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes glowPulse{0%,100%{opacity:.12}50%{opacity:.22}}
@keyframes dotFloat{0%,100%{transform:translateY(0) scale(1);opacity:.5}50%{transform:translateY(-8px) scale(1.3);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scanLine{0%{top:-4px}100%{top:1084px}}

.canvas{
  width:1080px;height:1080px;
  background:linear-gradient(145deg,#03193D,#0D47A1,#062B63,#082E6F);
  background-size:400% 400%;
  animation:bgPulse 10s ease infinite;
  position:relative;overflow:hidden;
}

/* Dot grid */
.dot-grid{
  position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.07) 1.5px,transparent 1.5px);
  background-size:38px 38px;
  animation:fadeIn 1.5s both .4s;pointer-events:none;
}

/* Scan line */
.scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,rgba(255,193,7,.25),transparent);
  animation:scanLine 6s linear infinite 2s;z-index:20;pointer-events:none;
}

/* Rotating arcs */
.arc{position:absolute;border-radius:50%}
.arc-1{
  width:860px;height:860px;border:1.5px solid rgba(255,193,7,.10);
  top:-320px;right:-250px;
  animation:rotate 40s linear infinite,fadeIn 1s both .3s;
}
.arc-2{
  width:600px;height:600px;border:1px solid rgba(255,255,255,.06);
  top:-80px;right:-10px;
  animation:counterRotate 25s linear infinite,fadeIn 1s both .5s;
}
.arc-3{
  width:360px;height:360px;border:1.5px solid rgba(255,193,7,.12);
  top:80px;right:130px;
  animation:rotate 18s linear infinite,fadeIn 1s both .7s;
}

/* Glow blob behind mascote */
.glow-blob{
  position:absolute;
  width:580px;height:580px;
  background:radial-gradient(circle,rgba(255,193,7,.12) 0%,transparent 65%);
  right:-80px;bottom:60px;border-radius:50%;
  animation:glowPulse 4s ease-in-out infinite,fadeIn 1.5s both 1s;
}

/* Diagonal lines */
.diag-1,.diag-2{position:absolute;background:rgba(255,193,7,.08)}
.diag-1{width:3px;height:350px;left:592px;top:50px;transform:rotate(15deg);animation:fadeIn 1s both 1.2s}
.diag-2{width:2px;height:220px;left:605px;top:400px;transform:rotate(15deg);animation:fadeIn 1s both 1.4s}

/* Floating accent dots */
.fdot{position:absolute;border-radius:50%;background:#FFC107}
.fdot-1{width:10px;height:10px;left:568px;top:220px;animation:dotFloat 2.8s ease-in-out infinite 0s,fadeIn 1s both 1.5s}
.fdot-2{width:6px;height:6px;left:580px;top:390px;animation:dotFloat 2.8s ease-in-out infinite .6s,fadeIn 1s both 1.7s}
.fdot-3{width:8px;height:8px;left:562px;top:560px;animation:dotFloat 2.8s ease-in-out infinite 1.2s,fadeIn 1s both 1.9s}
.fdot-4{width:4px;height:4px;left:590px;top:740px;animation:dotFloat 2.8s ease-in-out infinite 1.8s,fadeIn 1s both 2s}

/* Mascote */
.mascot-wrap{
  position:absolute;right:-15px;bottom:80px;width:530px;z-index:4;
  animation:fadeRight 1s cubic-bezier(.22,.61,.36,1) both 1s;
}
.mascot-wrap img{
  width:100%;display:block;
  mix-blend-mode:multiply;
  filter:drop-shadow(-15px 5px 30px rgba(0,0,0,.3));
  animation:float 4.5s ease-in-out infinite 2.2s;
}
/* Gradients to blend mascote edges */
.mfade-left{
  position:absolute;left:0;top:0;bottom:0;width:230px;
  background:linear-gradient(to right,#062B63 25%,rgba(6,43,99,.4) 70%,transparent);
  z-index:5;pointer-events:none;
}
.mfade-bottom{
  position:absolute;left:0;right:0;bottom:0;height:150px;
  background:linear-gradient(to top,#062B63 20%,transparent);
  z-index:5;pointer-events:none;
}

/* Content */
.content{
  position:absolute;left:0;top:0;width:600px;height:1000px;
  padding:72px 40px 0 75px;z-index:6;
  display:flex;flex-direction:column;
}
.logo-wrap{
  width:185px;
  animation:fadeLeft .9s ease both .5s;
}
.logo-wrap img{width:100%;display:block;mix-blend-mode:screen}

.headline-block{margin-top:50px}

.headline{
  font-family:'Bebas Neue',cursive;
  font-size:120px;line-height:.88;color:#fff;letter-spacing:3px;
  animation:fadeUp .9s cubic-bezier(.22,.61,.36,1) both .9s;
}
.headline .yellow{
  background:linear-gradient(90deg,#FFC107 0%,#FFE082 50%,#FFC107 100%);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:fadeUp .9s cubic-bezier(.22,.61,.36,1) both .9s,shimmerBar 3s linear infinite 2.5s;
}

.bar{
  width:0;height:5px;background:#FFC107;border-radius:3px;
  margin:28px 0 22px;
  animation:barGrow .8s ease both 1.6s;
}

.tagline{
  font-family:'Poppins',sans-serif;font-size:21px;font-weight:500;
  color:rgba(255,255,255,.78);line-height:1.65;
  animation:fadeUp .8s ease both 1.9s;
}

/* Bottom bar */
.bottom-bar{
  position:absolute;bottom:0;left:0;right:0;height:80px;
  background:#FFC107;z-index:10;
  display:flex;align-items:center;justify-content:space-between;padding:0 75px;
  animation:barSlide .9s cubic-bezier(.22,.61,.36,1) both 2.1s;
  overflow:hidden;
}
.bottom-bar::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  background-size:200%;
  animation:shimmerBar 4s linear infinite 3.5s;
}
.bb-lojas{
  font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;
  color:#062B63;letter-spacing:2.5px;text-transform:uppercase;position:relative;z-index:1;
}
.bb-sep{margin:0 10px;opacity:.4}
.bb-insta{
  font-family:'Poppins',sans-serif;font-weight:700;font-size:18px;
  color:#062B63;position:relative;z-index:1;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="dot-grid"></div>
  <div class="scan-line"></div>
  <div class="arc arc-1"></div>
  <div class="arc arc-2"></div>
  <div class="arc arc-3"></div>
  <div class="glow-blob"></div>
  <div class="diag-1"></div>
  <div class="diag-2"></div>
  <div class="fdot fdot-1"></div>
  <div class="fdot fdot-2"></div>
  <div class="fdot fdot-3"></div>
  <div class="fdot fdot-4"></div>

  <div class="mascot-wrap">
    <img src="../../identidade/mascote oficial pose 1.jpg" alt="">
    <div class="mfade-left"></div>
    <div class="mfade-bottom"></div>
  </div>

  <div class="content">
    <div class="logo-wrap">
      <img src="../../identidade/logotipo branco.jpg" alt="Tintas Laet">
    </div>
    <div class="headline-block">
      <div class="headline">A TINTA<br><span class="yellow">NOBRE</span><br>DA COMU-<br>NIDADE</div>
      <div class="bar"></div>
      <div class="tagline">Qualidade de verdade.<br>Preço que a comunidade<br>pode pagar.</div>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="bb-lojas">4 lojas<span class="bb-sep">·</span>ABC e Zona Leste<span class="bb-sep">·</span>SP</span>
    <span class="bb-insta">@Tintaslaet</span>
  </div>
</div>
</body>
</html>
