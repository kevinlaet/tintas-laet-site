<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Tintas Laet — 12x sem juros</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#020A18;
  display:flex; flex-direction:column; align-items:center;
  font-family:'Montserrat',sans-serif;
}

.slide { width:1080px; height:1920px; position:relative; overflow:hidden; flex-shrink:0; }

.s1 {
  background-image: url('foto-pintando.png');
  background-size: cover;
  background-position: center top;
  background-color: #F5ECD7;
}

/* scrim claro no topo — garante contraste do logo e do título, independente do tom da foto */
.s1 .topscrim { position:absolute; left:0; right:0; top:0; height:54%; z-index:3; pointer-events:none;
  background:linear-gradient(180deg, rgba(245,236,215,.98) 0%, rgba(245,236,215,.96) 55%, rgba(245,236,215,0) 100%); }

/* topo — sobre a área clara da foto (teto) */
.s1 .top { position:absolute; top:96px; left:0; right:0; display:flex; flex-direction:column; align-items:center; z-index:10; padding:0 92px; text-align:center; }
.s1 .top img { height:320px; object-fit:contain; margin-bottom:30px; }
.s1 .ey { font:800 28px/1 'Poppins',sans-serif; color:#0D47A1; letter-spacing:.22em; text-transform:uppercase; margin-bottom:24px; display:flex; align-items:center; gap:18px; }
.s1 .ey::before,.s1 .ey::after { content:''; width:38px; height:3px; background:rgba(13,71,161,.5); display:block; }
.s1 h1 { font:400 150px/1.05 'Bebas Neue',sans-serif; color:#062B63; letter-spacing:.01em; }
.s1 h1 .g { background:#FFC107; color:#062B63; padding:4px 26px; border-radius:16px; display:inline-block; }

/* gradiente inferior — pra legibilidade dos benefícios e rodapé sobre a foto */
.s1 .scrim { position:absolute; left:0; right:0; bottom:0; height:68%; z-index:4; pointer-events:none;
  background:linear-gradient(180deg, rgba(4,16,35,0) 0%, rgba(4,16,35,.75) 30%, rgba(4,16,35,.94) 60%, rgba(2,10,24,.98) 100%); }

.s1 .cc { position:absolute; left:0; right:0; bottom:170px; z-index:8; display:flex; flex-direction:column; align-items:center; padding:0 92px; }
.s1 .tg { font:700 30px/1.5 'Poppins',sans-serif; color:#fff; max-width:760px; text-align:center; margin-bottom:38px; text-shadow:0 2px 10px rgba(0,0,0,.4); }

.s1 .bens { display:flex; flex-direction:column; gap:16px; width:100%; max-width:820px; }
.s1 .ben { display:flex; align-items:center; gap:20px; background:#0D2F66; border:1.5px solid rgba(255,255,255,.35); border-radius:18px; padding:24px 30px; }
.s1 .bico { width:50px; height:50px; background:#FFC107; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.s1 .bico.green { background:#009739; }
.s1 .btx { font:700 27px/1.25 'Montserrat',sans-serif; color:#fff; text-align:left; }

.s1 .bot { position:absolute; bottom:64px; left:92px; right:92px; display:flex; align-items:center; justify-content:space-between; z-index:10; padding-top:20px; border-top:1.5px solid rgba(255,255,255,.3); }
.s1 .bot .hd { font:700 19px/1 'Poppins',sans-serif; color:#fff; letter-spacing:.05em; }
.s1 .bot .cd { font:700 17px/1.3 'Poppins',sans-serif; color:#FFC107; letter-spacing:.02em; text-align:right; max-width:420px; }

</style>
</head>
<body>

<div class="slide s1">
  <div class="topscrim"></div>

  <div class="top">
    <img src="../../../../identidade/logo tipo original-remove-bg-io.png" alt="Tintas Laet">
    <div class="ey">Diferencial Laet</div>
    <h1>12X<br><span class="g">SEM JUROS</span></h1>
  </div>

  <div class="scrim"></div>

  <div class="cc">
    <p class="tg">Pintou a casa toda e não quer comprometer o mês? Na Laet você parcela sem dor de cabeça.</p>
    <div class="bens">
      <div class="ben">
        <div class="bico">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#062B63" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        </div>
        <span class="btx">Sem juros no cartão</span>
      </div>
      <div class="ben">
        <div class="bico green">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20"/></svg>
        </div>
        <span class="btx">Chama no WhatsApp (11) 97714-0964</span>
      </div>
    </div>
  </div>

  <div class="bot">
    <span class="hd">@Tintaslaet</span>
    <span class="cd">Conheça a Tintas Laet e economize já!</span>
  </div>
</div>

</body>
</html>
